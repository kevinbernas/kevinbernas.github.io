<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout</title>
    <style>
        .container>div {
            border: green 1px solid;
            background-image: linear-gradient(blue,red);

        }

        .float-element {
            border: 1px solid red;
            float: left;
            margin: 0.2em;
            padding:0;
            box-sizing: border-box;
        }

        #left {
            width: calc(70%- 0.2em);
        }

        #right {
            width: calc(30%- 0.2em);
        }

        .clearfix {
            clear: both;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="left" class="float-element">
        left
    </div>
    <div id="right" class="float-element">
        right
    </div>
    <div class="clearfix">
        test
    </div>
</div>


</body>
</html>
