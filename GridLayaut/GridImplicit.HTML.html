<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1">
    <title>GridImplicit</title>
    <style>
        :root{
            box-sizing: border-box;
        }
        *,
        ::after,
        ::before{
            box-sizing: inherit;
        }
        body{
            background-color: #709b90;
            font-family: Calibri, sans-serif;
        }
        .portfolio{
            max-width:900px;
            margin: 0 auto;
        }

        figure{
        margin: 0;
        }
        figure img{
            max-width: 100%;
            margin: 0;
            display: block;
        }
        figure figcaption{
            margin: 0;
            padding: 0.3em 0.8em;
            text-align: right;
            background-color: rgba(0,0,0,0.5);
            color: white;
        }
        /*
        GRID
         */
        .portfolio{
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            grid-auto-rows: 1fr;
            grid-gap: 1em;
        }


        .portfolio .featured{
            grid-row: span 2;
            grid-column: span 2;
        }
        /*
        GRID DENSE
         */
        .portfolio{
            grid-auto-flow: dense;
        }
        /*
        FILL UNWANTED FLEX
         */
        figure{
            display: flex;
            flex-direction: column;
        }
        figure img{
            flex: 1;
            object-fit: cover;
        }
    </style>
</head>
<body>
<div class="container">
<div class="portfolio">
    <figure>
        <img src="AdobeStock_470662518_Preview.jpeg" alt="img1">
        <figcaption>img1</figcaption>
    </figure> <figure class="featured">
        <img src="AdobeStock_476112891_Preview.jpeg" alt="img2">
        <figcaption>img2</figcaption>
    </figure> <figure>
        <img src="AdobeStock_476155062_Preview.jpeg" alt="img3">
        <figcaption>img3</figcaption>
    </figure> <figure>
        <img src="AdobeStock_476207570_Preview.jpeg" alt="img4">
        <figcaption>img4</figcaption>
    </figure> <figure class="featured">
        <img src="AdobeStock_476250947_Preview.jpeg" alt="img5">
        <figcaption>img5</figcaption>
    </figure> <figure class="featured">
        <img src="AdobeStock_476477617_Preview.jpeg" alt="img6">
        <figcaption>img6</figcaption>
    </figure> <figure>
        <img src="AdobeStock_476736381_Preview.jpeg" alt="img7">
        <figcaption>img7</figcaption>
    </figure>
</div>
</div>

</body>
</html>
